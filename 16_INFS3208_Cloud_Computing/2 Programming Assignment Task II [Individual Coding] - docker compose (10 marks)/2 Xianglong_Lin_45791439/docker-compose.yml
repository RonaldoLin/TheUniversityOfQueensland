version: "3.3" # Specifies the version of docker-compose

services: # Defines the list of services to be started

  # PHP-FPM service
  myphp:
    build: # Specifies the build information
      context: ./src # Sets the build context to the ./src directory
      dockerfile: php/dockerfile # Specifies the path for the Dockerfile
      target: php-fpm-stage # Sets the target stage for multi-stage builds
    container_name: myphp # The name for the container
    volumes: # Specifies volumes
      - ./src:/var/www/html # Mounts the ./src directory from the host to the /var/www/html directory in the container
    ports: # Port mappings
      - "9000:9000" # Maps port 9000 inside the container to port 9000 on the host
    depends_on: # Defines dependencies
      - mysql # myphp service depends on the mysql service
      - myredis # myphp service depends on the myredis service
    networks: # Specifies the networks used
      - mynet

  # Nginx service
  mynginx:
    build:
      context: ./src
      dockerfile: php/dockerfile
      target: nginx-stage
    container_name: mynginx
    volumes:
      - ./src/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - myphp
    networks:
      - mynet

  # MariaDB database service
  mysql:
    image: mariadb:latest # The image to be used
    container_name: mysql
    environment: # Specifies environment variables
      MYSQL_ROOT_PASSWORD: MyDBRoot123
      MYSQL_DATABASE: cloud_computing
      MYSQL_USER: php
      MYSQL_PASSWORD: php
    networks:
      - mynet

  # phpMyAdmin service
  phpMyAdmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpMyAdmin
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
    ports:
      - "8082:80"
    depends_on:
      - mysql
    networks:
      - mynet

  # Redis service
  myredis:
    image: redis:latest
    container_name: myredis
    networks:
      - mynet

networks: # Defines the networks
  mynet:
    driver: bridge # Uses bridge driver
